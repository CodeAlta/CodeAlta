version = 1

[[rules]]
id = "alibaba-dashscope-openai-chat"
display_name = "Alibaba DashScope OpenAI Chat"
types = ["openai-chat"]
provider_keys = ["alibaba", "dashscope", "aliyun"]
host_suffixes = ["dashscope.aliyuncs.com", "dashscope-intl.aliyuncs.com", "dashscope-us.aliyuncs.com", "cn-hongkong.dashscope.aliyuncs.com", "coding-intl.dashscope.aliyuncs.com", "maas.aliyuncs.com"]

[rules.profile]
supports_developer_role = false
supports_store = false
supports_reasoning_effort = false
max_tokens_field_name = "max_tokens"

[rules.openai]
extra_body_defaults = { stream_options = { include_usage = true }, enable_thinking = true, preserve_thinking = true }

[[rules]]
id = "minimax-openai-chat"
display_name = "MiniMax OpenAI Chat"
types = ["openai-chat"]
provider_keys = ["minimax"]
host_suffixes = ["minimax.io", "minimaxi.com"]

[rules.profile]
supports_developer_role = false
reasoning_field_names_prepend = ["reasoning_details[0].text"]

[rules.openai]
extra_body_defaults = { reasoning_split = true }

[[rules]]
id = "deepseek-openai-chat"
display_name = "DeepSeek OpenAI Chat"
types = ["openai-chat"]
provider_keys = ["deepseek"]
host_suffixes = ["deepseek.com"]

[rules.profile]
supports_developer_role = false
supports_store = false
max_tokens_field_name = "max_tokens"
reasoning_input_field_name = "reasoning_content"

[rules.openai]
extra_body_defaults = { thinking = { type = "enabled" } }

[[rules]]
id = "zai-openai-chat"
display_name = "Z.AI OpenAI Chat"
types = ["openai-chat"]
provider_keys = ["zai", "z-ai", "zai-coding-cn", "zhipu", "zhipuai", "bigmodel"]
host_suffixes = ["api.z.ai", "open.bigmodel.cn"]

[rules.profile]
reasoning_input_field_name = "reasoning_content"

[[rules]]
id = "xiaomi-openai-chat"
display_name = "Xiaomi OpenAI Chat"
types = ["openai-chat"]
provider_keys = ["xiaomi"]
host_suffixes = ["xiaomimimo.com"]

[rules.profile]
supports_developer_role = false
supports_store = false
supports_reasoning_effort = false
supports_parallel_tool_calls = false
supports_strict_tools = false
max_tokens_field_name = "max_tokens"
